name: Build and Push Docker Image

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run build without pushing to registry"
        required: false
        default: false
        type: boolean
      no_cache:
        description: "Build without Docker layer cache"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "src/**"
      - package.json
      - bun.lock
      - tsconfig.json
      - Dockerfile
      - ".dockerignore"
      - ".github/workflows/publish-docker.yml"

env:
  REGISTRY: ghcr.io

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event.inputs.dry_run != 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: ${{ github.event.inputs.no_cache != 'true' && format('type=registry,ref={0}/{1}:cache', env.REGISTRY, github.repository) || '' }}
          cache-to: type=registry,mode=max,image-manifest=true,oci-mediatypes=true,ref=${{ env.REGISTRY }}/${{ github.repository }}:cache

      - name: Output image info
        run: |
          echo "## Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ env.REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Platform:** linux/amd64" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Dry run** - image was not pushed to registry" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    needs: build
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 2770147
          private-key: ${{ secrets.GH_APP_INFRAFC_DEPLOY_KEY }}
          owner: x1-labs
          repositories: infrafc

      - name: Trigger deployment
        uses: x1-labs/infrafc/.github/actions/trigger-deploy@main
        with:
          service: xenblocks-airdrop
          environment: production
          image_tag: ${{ github.sha }}
          commit_sha: ${{ github.sha }}
          repo_url: ${{ github.server_url }}/${{ github.repository }}
          token: ${{ steps.app-token.outputs.token }}
